server.port=8084
spring.application.name=expense-tracker

# Database Configuration (Uses environment variables, falls back to H2 for local dev)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${PGUSER:sa}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Hibernate / JPA configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (Only accessible locally if using H2)
spring.h2.console.enabled=true